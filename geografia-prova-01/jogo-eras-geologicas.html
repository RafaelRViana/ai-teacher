<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Explorer - Viagem pelas Eras Geologicas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== TELA INICIAL ===== */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
    text-align: center;
    padding: 20px;
  }

  #start-screen h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5em;
    color: #4ade80;
    text-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
    margin-bottom: 10px;
  }

  #start-screen .subtitle {
    font-size: 1.3em;
    color: #94a3b8;
    margin-bottom: 40px;
  }

  .dino-title {
    font-size: 120px;
    margin-bottom: 20px;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8em;
    padding: 18px 60px;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #1a1a2e;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 30px rgba(74, 222, 128, 0.4);
  }

  .start-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(74, 222, 128, 0.6);
  }

  /* ===== MAPA DAS ERAS ===== */
  #map-screen {
    display: none;
    min-height: 100vh;
    padding: 20px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(10px);
  }

  .score-display {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4em;
    color: #fbbf24;
  }

  .lives-display {
    font-size: 1.4em;
  }

  .era-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2em;
    color: #4ade80;
  }

  .progress-bar-container {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee, #a78bfa, #f472b6);
    border-radius: 10px;
    transition: width 0.8s ease;
    width: 0%;
  }

  .era-map {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .era-card {
    background: rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 30px;
    text-align: center;
    transition: all 0.3s;
    border: 3px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .era-card.locked {
    opacity: 0.4;
    filter: grayscale(0.5);
  }

  .era-card.current {
    border-color: #4ade80;
    box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
    opacity: 1;
    animation: pulse-border 2s infinite;
  }

  .era-card.completed {
    border-color: #fbbf24;
    opacity: 1;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); }
    50% { box-shadow: 0 0 40px rgba(74, 222, 128, 0.6); }
  }

  .era-card .era-icon { font-size: 60px; margin-bottom: 15px; }
  .era-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5em;
    margin-bottom: 8px;
  }
  .era-card p { color: #94a3b8; font-size: 0.95em; }
  .era-card .era-time { color: #67e8f9; font-size: 0.85em; margin-top: 8px; }

  .era-card .badge {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 30px;
  }

  .play-era-btn {
    margin-top: 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1em;
    padding: 12px 35px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .play-era-btn.active {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #1a1a2e;
  }

  .play-era-btn.active:hover { transform: scale(1.08); }

  .play-era-btn:disabled {
    background: #374151;
    color: #6b7280;
    cursor: not-allowed;
  }

  /* ===== TELA DE PERGUNTAS ===== */
  #question-screen {
    display: none;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(180deg, #0f0c29, #302b63);
  }

  .question-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .question-header .era-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8em;
    margin-bottom: 5px;
  }

  .question-counter {
    color: #94a3b8;
    font-size: 1.1em;
  }

  .question-card {
    max-width: 750px;
    margin: 0 auto;
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 35px;
    backdrop-filter: blur(10px);
  }

  .question-dino {
    font-size: 50px;
    text-align: center;
    margin-bottom: 15px;
  }

  .question-text {
    font-size: 1.25em;
    font-weight: 700;
    text-align: center;
    margin-bottom: 30px;
    line-height: 1.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .option-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 1.1em;
    font-weight: 700;
    padding: 18px 25px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: left;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.15);
    border-color: #4ade80;
    transform: translateX(8px);
  }

  .option-btn.correct {
    background: rgba(74, 222, 128, 0.25);
    border-color: #4ade80;
    color: #4ade80;
  }

  .option-btn.wrong {
    background: rgba(239, 68, 68, 0.25);
    border-color: #ef4444;
    color: #ef4444;
  }

  .option-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 16px;
    font-size: 1.05em;
    line-height: 1.6;
    display: none;
  }

  .feedback-box.correct {
    background: rgba(74, 222, 128, 0.12);
    border: 2px solid #4ade80;
    color: #bbf7d0;
  }

  .feedback-box.wrong {
    background: rgba(239, 68, 68, 0.12);
    border: 2px solid #ef4444;
    color: #fca5a5;
  }

  .next-btn {
    display: none;
    margin: 25px auto 0;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2em;
    padding: 14px 45px;
    background: linear-gradient(135deg, #22d3ee, #3b82f6);
    color: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .next-btn:hover { transform: scale(1.08); }

  /* ===== TELA FINAL ===== */
  #end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
    text-align: center;
    padding: 30px;
  }

  #end-screen .trophy { font-size: 100px; margin-bottom: 20px; }

  #end-screen h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8em;
    color: #fbbf24;
    margin-bottom: 15px;
  }

  #end-screen .final-score {
    font-size: 1.5em;
    color: #94a3b8;
    margin-bottom: 10px;
  }

  .stars { font-size: 50px; margin: 20px 0; }

  .result-message {
    font-size: 1.2em;
    color: #d1d5db;
    max-width: 500px;
    margin-bottom: 30px;
    line-height: 1.6;
  }

  .retry-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4em;
    padding: 16px 50px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 30px rgba(167, 139, 250, 0.4);
  }

  .retry-btn:hover {
    transform: scale(1.1);
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    opacity: 0;
    animation: confetti-fall 3s ease-in forwards;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; top: -10px; transform: rotate(0deg); }
    100% { opacity: 0; top: 110vh; transform: rotate(720deg); }
  }

  /* ===== RESPONSIVO ===== */
  @media (max-width: 600px) {
    #start-screen h1 { font-size: 2.2em; }
    .dino-title { font-size: 80px; }
    .start-btn { font-size: 1.4em; padding: 14px 40px; }
    .question-text { font-size: 1.1em; }
    .question-card { padding: 22px; }
    .era-card h3 { font-size: 1.2em; }
  }
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="start-screen">
  <div class="dino-title">🦕</div>
  <h1>Dino Explorer</h1>
  <p class="subtitle">Uma aventura pelas Eras Geologicas da Terra!</p>
  <button class="start-btn" onclick="startGame()">Iniciar Aventura!</button>
</div>

<!-- MAPA DAS ERAS -->
<div id="map-screen">
  <div class="top-bar">
    <span class="score-display">⭐ <span id="score">0</span> pontos</span>
    <span class="era-label" id="current-era-label">Mapa das Eras</span>
    <span class="lives-display" id="lives">❤️❤️❤️</span>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="era-map" id="era-map"></div>
</div>

<!-- TELA DE PERGUNTAS -->
<div id="question-screen">
  <div class="top-bar">
    <span class="score-display">⭐ <span id="q-score">0</span></span>
    <span class="question-counter" id="q-counter">Pergunta 1/5</span>
    <span class="lives-display" id="q-lives">❤️❤️❤️</span>
  </div>
  <div class="question-header">
    <div id="q-era-icon" style="font-size:50px;"></div>
    <div class="era-name" id="q-era-name"></div>
  </div>
  <div class="question-card">
    <div class="question-dino" id="q-dino">🦖</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback-box" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Proxima ➜</button>
  </div>
</div>

<!-- TELA FINAL -->
<div id="end-screen">
  <div class="trophy">🏆</div>
  <h2 id="end-title">Parabens!</h2>
  <div class="final-score" id="final-score"></div>
  <div class="stars" id="final-stars"></div>
  <div class="result-message" id="result-message"></div>
  <button class="retry-btn" onclick="restartGame()">Jogar de Novo!</button>
</div>

// ===== DADOS DO JOGO =====

        options: ['Duras, moles e medias', 'Igneas (magmaticas), sedimentares e metamorficas', 'Grandes, pequenas e medias', 'Naturais, artificiais e mistas'],
        correct: 1,
        explanation: 'Os tres tipos de rochas sao: igneas (formadas pelo magma), sedimentares (formadas por sedimentos) e metamorficas (transformadas por calor e pressao)!'
      },
      {
        text: 'As rochas igneas (magmaticas) se formam a partir do:',
        options: ['Acumulo de areia', 'Resfriamento e solidificacao do magma', 'Pressao sobre outras rochas', 'Acumulo de fosseis'],
        correct: 1,
        explanation: 'As rochas igneas se formam quando o magma (rocha derretida) esfria e endurece! O granito e o basalto sao exemplos.'
      },
      {
        text: 'O que acontece para formar uma rocha metamorfica?',
        options: ['Magma esfria rapidamente', 'Uma rocha existente e transformada por temperatura e pressao', 'Sedimentos se acumulam', 'A rocha e dissolvida pela agua'],
        correct: 1,
        explanation: 'Rochas metamorficas se formam quando rochas existentes sao transformadas por muita temperatura e pressao! Ex: marmore e gnaisse.'
      },
      {
        text: 'Qual sequencia correta do ciclo de formacao das rochas sedimentares?',
        options: ['Deposicao → Erosao → Transporte', 'Intemperismo → Erosao → Transporte → Deposicao → Litificacao', 'Litificacao → Deposicao → Transporte', 'Erosao → Litificacao → Deposicao'],
        correct: 1,
        explanation: 'O ciclo e: intemperismo (rocha se desgasta) → erosao → transporte → deposicao → litificacao (vira rocha de novo)!'
      },
      {
        text: 'O ciclo das rochas mostra que:',
        options: ['As rochas nunca mudam', 'Um tipo de rocha pode se transformar em outro ao longo do tempo', 'Apenas vulcoes criam rochas', 'Rochas so existem na superficie'],
        correct: 1,
        explanation: 'O ciclo das rochas mostra que as rochas estao sempre se transformando! Uma rocha ignea pode virar sedimentar, que pode virar metamorfica, e assim por diante.'
      }
    ]
  }
];

// ===== ESTADO DO JOGO =====
let score = 0;
let lives = 3;
let currentEraIndex = 0;
let currentQuestionIndex = 0;
let completedEras = [];
let totalCorrect = 0;
let totalQuestions = 0;

// ===== FUNCOES =====
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('map-screen').style.display = 'block';
  renderMap();
}

function renderMap() {
  const map = document.getElementById('era-map');
  map.innerHTML = '';

  eras.forEach((era, index) => {
    const isCompleted = completedEras.includes(index);
    const isCurrent = index === currentEraIndex;
    const isLocked = index > currentEraIndex;

    const card = document.createElement('div');
    card.className = `era-card ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''} ${isLocked ? 'locked' : ''}`;
    card.style.background = isCompleted ? `rgba(251, 191, 36, 0.08)` : isCurrent ? `rgba(74, 222, 128, 0.08)` : '';

    card.innerHTML = `
      ${isCompleted ? '<span class="badge">✅</span>' : isLocked ? '<span class="badge">🔒</span>' : '<span class="badge">⚡</span>'}
      <div class="era-icon">${era.icon}</div>
      <h3 style="color:${era.color}">${era.name}</h3>
      <p>${era.desc}</p>
      <div class="era-time">⏰ ${era.time}</div>
      <button class="play-era-btn ${isCurrent ? 'active' : ''}"
        ${!isCurrent ? 'disabled' : ''}
        onclick="startEra(${index})">
        ${isCompleted ? '✅ Completa!' : isCurrent ? '🎮 Jogar!' : '🔒 Bloqueada'}
      </button>
    `;
    map.appendChild(card);
  });

  // Atualizar barra de progresso
  const progress = (completedEras.length / eras.length) * 100;
  document.getElementById('progress-bar').style.width = progress + '%';
  document.getElementById('score').textContent = score;
  document.getElementById('current-era-label').textContent = currentEraIndex < eras.length ? `Proxima: ${eras[currentEraIndex].name}` : 'Todas completas!';
  updateLives('lives');
}

function startEra(index) {
  currentEraIndex = index;
  currentQuestionIndex = 0;
  document.getElementById('map-screen').style.display = 'none';
  document.getElementById('question-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const era = eras[currentEraIndex];
  const q = era.questions[currentQuestionIndex];

  document.getElementById('q-era-icon').textContent = era.icon;
  document.getElementById('q-era-name').textContent = era.name;
  document.getElementById('q-era-name').style.color = era.color;
  document.getElementById('q-counter').textContent = `Pergunta ${currentQuestionIndex + 1}/${era.questions.length}`;
  document.getElementById('q-score').textContent = score;
  updateLives('q-lives');

  const dinos = ['🦕', '🦖', '🦴', '🌋', '🌍', '🪨', '🐟', '🦎', '🦣', '🏔️'];
  document.getElementById('q-dino').textContent = dinos[Math.floor(Math.random() * dinos.length)];

  document.getElementById('q-text').textContent = q.text;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${letters[i]}) ${opt}`;
    btn.onclick = () => checkAnswer(i);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('feedback').className = 'feedback-box';
  document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(selected) {
  const era = eras[currentEraIndex];
  const q = era.questions[currentQuestionIndex];
  const buttons = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedback');

  totalQuestions++;

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    if (i === selected && selected !== q.correct) btn.classList.add('wrong');
  });

  if (selected === q.correct) {
    score += 10;
    totalCorrect++;
    feedback.className = 'feedback-box correct';
    feedback.innerHTML = `<strong>✅ Muito bem!</strong><br>${q.explanation}`;
  } else {
    lives--;
    feedback.className = 'feedback-box wrong';
    feedback.innerHTML = `<strong>❌ Quase la!</strong><br>${q.explanation}`;
  }

  feedback.style.display = 'block';
  document.getElementById('q-score').textContent = score;
  updateLives('q-lives');

  if (lives <= 0) {
    setTimeout(() => showEndScreen(), 1500);
    return;
  }

  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('next-btn').textContent =
    currentQuestionIndex < era.questions.length - 1 ? 'Proxima ➜' : 'Concluir Era! 🎉';
}

function nextQuestion() {
  const era = eras[currentEraIndex];
  currentQuestionIndex++;

  if (currentQuestionIndex >= era.questions.length) {
    // Era completa!
    completedEras.push(currentEraIndex);
    currentEraIndex++;

    if (currentEraIndex >= eras.length) {
      showEndScreen();
    } else {
      document.getElementById('question-screen').style.display = 'none';
      document.getElementById('map-screen').style.display = 'block';
      renderMap();
    }
  } else {
    showQuestion();
  }
}

function updateLives(elementId) {
  const el = document.getElementById(elementId);
  el.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
}

function showEndScreen() {
  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('map-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'flex';

  const percent = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
  let stars, title, message;

  if (percent >= 90) {
    stars = '⭐⭐⭐';
    title = 'Incrivel! Voce e um Paleontologista!';
    message = 'Voce dominou todas as eras geologicas! Os dinossauros estariam orgulhosos de voce! 🦕';
  } else if (percent >= 70) {
    stars = '⭐⭐';
    title = 'Muito Bem! Otimo Explorador!';
    message = 'Voce sabe muito sobre a historia da Terra! Continue estudando para se tornar um expert! 🌍';
  } else if (percent >= 50) {
    stars = '⭐';
    title = 'Bom Trabalho!';
    message = 'Voce esta aprendendo bastante! Tente de novo para melhorar sua pontuacao! 💪';
  } else {
    stars = '💫';
    title = 'Continue Tentando!';
    message = 'A historia da Terra e fascinante! Estude mais um pouco e tente novamente. Voce vai conseguir! 📚';
  }

  document.getElementById('end-title').textContent = title;
  document.getElementById('final-score').textContent = `${score} pontos | ${totalCorrect}/${totalQuestions} acertos (${percent}%)`;
  document.getElementById('final-stars').textContent = stars;
  document.getElementById('result-message').textContent = message;

  if (percent >= 70) launchConfetti();
}

function launchConfetti() {
  const colors = ['#4ade80', '#fbbf24', '#ef4444', '#3b82f6', '#a78bfa', '#ec4899', '#22d3ee'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 2 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

function restartGame() {
  score = 0;
  lives = 3;
  currentEraIndex = 0;
  currentQuestionIndex = 0;
  completedEras = [];
  totalCorrect = 0;
  totalQuestions = 0;

  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('map-screen').style.display = 'block';
  renderMap();
}
</script>
