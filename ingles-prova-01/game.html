<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>English World Conqueror</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --oceania: #4ECDC4; --africa: #F7DC6F; --asia: #E74C3C;
  --europe: #3498DB; --america: #2ECC71; --antarctica: #9B59B6;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; color: #fff; overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.game-container {
  max-width: 900px; margin: 0 auto; padding: 10px 15px 30px;
}
h1 {
  text-align: center; font-size: 1.8em; margin: 10px 0;
  background: linear-gradient(90deg, #f7dc6f, #e74c3c, #9b59b6, #3498db, #2ecc71);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-shadow: none;
  animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
  0%,100% { filter: brightness(1); } 50% { filter: brightness(1.3); }
}
/* ---- World Map SVG ---- */
.world-map-container {
  margin: 10px 0; padding: 8px;
  background: linear-gradient(135deg, rgba(139,119,81,0.3), rgba(89,74,52,0.3));
  border-radius: 16px;
  border: 3px solid rgba(139,119,81,0.5);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.3);
  position: relative;
}
.world-map-container::before {
  content: ''; position: absolute; inset: 4px;
  border: 1px solid rgba(139,119,81,0.3); border-radius: 12px;
  pointer-events: none;
}
.world-map-svg {
  width: 100%; height: auto; display: block; border-radius: 10px;
  overflow: hidden;
}
.ocean-bg { fill: #0a1628; }
.grid-line { stroke: rgba(255,255,255,0.04); stroke-width: 0.5; fill: none; }
.continent-path {
  transition: all 0.4s ease; cursor: default;
  stroke-width: 1.5; stroke: rgba(0,0,0,0.3);
}
.continent-path.locked {
  fill: #2a2a2a !important; opacity: 0.35;
  stroke: rgba(255,255,255,0.05);
}
.continent-path.current {
  opacity: 1; stroke: rgba(255,255,255,0.7); stroke-width: 2;
  filter: drop-shadow(0 0 8px var(--glow-color, #fff));
  animation: svgPulse 1.8s ease-in-out infinite;
}
.continent-path.conquered {
  opacity: 1; stroke: gold; stroke-width: 2.5;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.5));
}
.continent-label {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-weight: 700; fill: #fff; text-anchor: middle;
  pointer-events: none; font-size: 11px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  paint-order: stroke; stroke: rgba(0,0,0,0.6); stroke-width: 2.5px;
}
.continent-label.locked { opacity: 0.3; }
.continent-label.conquered { fill: #fff; }
.continent-status-icon {
  font-size: 14px; text-anchor: middle; pointer-events: none;
}
@keyframes svgPulse {
  0%,100% { filter: drop-shadow(0 0 4px var(--glow-color, #fff)); }
  50% { filter: drop-shadow(0 0 16px var(--glow-color, #fff)); }
}
.continent-tooltip {
  position: absolute; background: rgba(0,0,0,0.9);
  color: #fff; padding: 6px 12px; border-radius: 8px;
  font-size: 0.8em; font-weight: 600; pointer-events: none;
  opacity: 0; transition: opacity 0.2s; z-index: 10;
  white-space: nowrap; border: 1px solid rgba(255,255,255,0.15);
}
/* ---- Game Area ---- */
.game-area {
  background: rgba(255,255,255,0.07); border-radius: 20px;
  padding: 20px; margin-top: 10px;
  border: 2px solid rgba(255,255,255,0.1);
}
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 15px; flex-wrap: wrap; gap: 8px;
}
.status-item {
  background: rgba(255,255,255,0.1); padding: 8px 16px;
  border-radius: 12px; font-size: 0.95em; font-weight: 600;
}
.progress-container {
  width: 100%; height: 28px; background: rgba(0,0,0,0.3);
  border-radius: 14px; overflow: hidden; margin-bottom: 18px;
  position: relative;
}
.progress-bar {
  height: 100%; border-radius: 14px; transition: width 0.6s ease;
  position: relative; display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 0.85em;
  min-width: 40px;
}
.progress-bar::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: rgba(255,255,255,0.2); border-radius: 14px 14px 0 0;
}
/* ---- Dice ---- */
.dice-section { text-align: center; margin: 15px 0; }
.dice-btn {
  background: linear-gradient(145deg, #ff6b6b, #ee5a24);
  color: #fff; border: none; padding: 16px 50px; font-size: 1.3em;
  font-weight: 800; border-radius: 16px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(238,90,36,0.4);
  transition: all 0.2s ease; text-transform: uppercase;
  letter-spacing: 1px;
}
.dice-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(238,90,36,0.5); }
.dice-btn:active { transform: translateY(1px); }
.dice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.dice-display {
  font-size: 5em; margin: 15px 0; display: none;
  animation: diceAppear 0.3s ease;
}
@keyframes diceAppear { from { transform: scale(0) rotate(180deg); } to { transform: scale(1) rotate(0); } }
@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(90deg) scale(1.2); }
  50% { transform: rotate(180deg) scale(0.9); }
  75% { transform: rotate(270deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.dice-rolling { animation: diceRoll 0.15s linear infinite; display: block !important; }
/* ---- Question ---- */
.question-area { display: none; margin-top: 15px; }
.question-text {
  background: rgba(255,255,255,0.1); padding: 18px; border-radius: 14px;
  font-size: 1.15em; line-height: 1.5; margin-bottom: 15px;
  border-left: 5px solid currentColor;
}
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-btn {
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
  color: #fff; padding: 14px; border-radius: 12px; font-size: 1.05em;
  cursor: pointer; transition: all 0.2s ease; text-align: left;
  font-weight: 600;
}
.option-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
.option-btn:active { transform: scale(0.98); }
.option-btn.correct {
  background: rgba(46,204,113,0.4) !important; border-color: #2ecc71 !important;
  animation: correctFlash 0.5s ease;
}
.option-btn.wrong {
  background: rgba(231,76,60,0.4) !important; border-color: #e74c3c !important;
  animation: shake 0.5s ease;
}
@keyframes correctFlash { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.feedback {
  text-align: center; font-size: 1.3em; font-weight: 700;
  margin-top: 12px; padding: 10px; border-radius: 12px;
  display: none;
}
.feedback.correct-fb { background: rgba(46,204,113,0.2); color: #2ecc71; }
.feedback.wrong-fb { background: rgba(231,76,60,0.2); color: #e74c3c; }
/* ---- Celebration Overlay ---- */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; z-index: 1000;
  justify-content: center; align-items: center; flex-direction: column;
  text-align: center; padding: 30px;
}
.overlay.show { display: flex; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.overlay h2 { font-size: 2.2em; margin-bottom: 15px; }
.overlay p { font-size: 1.2em; margin-bottom: 8px; opacity: 0.9; }
.overlay-btn {
  margin-top: 25px; padding: 16px 50px; font-size: 1.2em;
  background: linear-gradient(145deg, #f7dc6f, #f39c12); color: #333;
  border: none; border-radius: 14px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 15px rgba(243,156,18,0.4);
}
.overlay-btn:hover { transform: scale(1.05); }
/* ---- Confetti ---- */
.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  top: -10px; z-index: 1001; pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
/* ---- Reset Button ---- */
.reset-section { text-align: center; margin-top: 20px; }
.reset-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5); padding: 8px 20px; border-radius: 10px;
  font-size: 0.8em; cursor: pointer;
}
.reset-btn:hover { color: #e74c3c; border-color: #e74c3c; }
/* ---- Responsive ---- */
@media (max-width: 600px) {
  h1 { font-size: 1.4em; }
  .world-map-container { padding: 5px; margin: 8px 0; }
  .continent-label { font-size: 8px; }
  .continent-status-icon { font-size: 10px; }
  .options { grid-template-columns: 1fr; }
  .dice-btn { padding: 14px 40px; font-size: 1.1em; }
  .dice-display { font-size: 3.5em; }
}
/* ---- Start Screen ---- */
.start-screen {
  text-align: center; padding: 40px 20px;
}
.start-screen h2 { font-size: 1.6em; margin: 15px 0; }
.start-screen p { font-size: 1em; opacity: 0.8; margin: 8px 0; line-height: 1.6; }
.start-btn {
  margin-top: 25px; padding: 18px 60px; font-size: 1.3em;
  background: linear-gradient(145deg, #2ecc71, #27ae60); color: #fff;
  border: none; border-radius: 16px; font-weight: 800; cursor: pointer;
  box-shadow: 0 6px 20px rgba(46,204,113,0.4);
  text-transform: uppercase; letter-spacing: 2px;
}
.start-btn:hover { transform: scale(1.05); }
</style>
</head>

// ========== AUDIO ENGINE ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type='square', vol=0.12) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxDice() { for(let i=0;i<6;i++) setTimeout(()=>playTone(200+i*50,0.05,'square',0.08),i*50); }

function sfxWrong() { playTone(200,0.3,'sawtooth',0.1); setTimeout(()=>playTone(150,0.3,'sawtooth',0.1),150); }
function sfxConquest() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.15),i*150)); }

// ========== CONFETTI ==========
function spawnConfetti(count=60) {
  const colors = ['#f7dc6f','#e74c3c','#3498db','#2ecc71','#9b59b6','#ff6b6b','#4ecdc4'];
  for(let i=0;i<count;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (6+Math.random()*8)+'px';
    el.style.height = (6+Math.random()*8)+'px';
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    el.style.animationDuration = (2+Math.random()*2)+'s';
    el.style.animationDelay = Math.random()*0.5+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

// ========== GAME STATE ==========
let state = loadState();
function defaultState() { return { currentContinent: 0, scores: [0,0,0,0,0,0], conquered: [false,false,false,false,false,false], usedQs: [[],[],[],[],[],[]] }; }
function loadState() {
  try { const s = JSON.parse(localStorage.getItem('ewc_state')); if (s && s.scores) return s; } catch(e) {}
  return defaultState();
}
function saveState() { localStorage.setItem('ewc_state', JSON.stringify(state)); }

let currentDice = 0;
let currentQuestion = null;
let isRolling = false;
let answered = false;

// ========== RENDER ==========
// Map from continent index to SVG element IDs
const CONTINENT_SVG_IDS = ['oceania','africa','asia','europe','americas','antarctica'];

function renderMap() {
  CONTINENTS.forEach((c, i) => {
    const svgId = CONTINENT_SVG_IDS[i];
    const path = document.getElementById('continent-' + svgId);
    const label = document.getElementById('label-' + svgId);
    const icon = document.getElementById('icon-' + svgId);
    if (!path) return;

    // Reset classes
    path.classList.remove('locked','current','conquered');
    label.classList.remove('locked','conquered');

    if (state.conquered[i]) {
      path.classList.add('conquered');
      label.classList.add('conquered');
      path.style.fill = c.color;
      path.style.setProperty('--glow-color', c.color);
      icon.textContent = '\u2714\uFE0F';
    } else if (i === state.currentContinent) {
      path.classList.add('current');
      path.style.fill = c.color;
      path.style.setProperty('--glow-color', c.color);
      icon.textContent = '\uD83D\uDCCD';
    } else {
      path.classList.add('locked');
      path.style.fill = '#2a2a2a';
      label.classList.add('locked');
      icon.textContent = '\uD83D\uDD12';
    }
  });

  // Setup hover tooltips
  setupMapTooltips();
}

function setupMapTooltips() {
  const container = document.getElementById('worldMapContainer');
  const tooltip = document.getElementById('continentTooltip');
  CONTINENTS.forEach((c, i) => {
    const svgId = CONTINENT_SVG_IDS[i];
    const path = document.getElementById('continent-' + svgId);
    if (!path) return;
    path.onmouseenter = (e) => {
      let statusText = '';
      if (state.conquered[i]) statusText = 'Conquistado!';
      else if (i === state.currentContinent) statusText = 'Atual - ' + c.label;
      else statusText = 'Bloqueado';
      tooltip.innerHTML = `<span style="color:${c.color}">${c.emoji} ${c.name}</span> - ${statusText}`;
      tooltip.style.opacity = '1';
    };
    path.onmousemove = (e) => {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 35) + 'px';
    };
    path.onmouseleave = () => { tooltip.style.opacity = '0'; };
  });
}

function renderStatus() {
  if (state.currentContinent >= 6) return;
  const c = CONTINENTS[state.currentContinent];
  const score = state.scores[state.currentContinent];
  const goal = c.goal;
  document.getElementById('continentStatus').innerHTML = `${c.emoji} ${c.name}`;
  document.getElementById('continentStatus').style.borderLeft = `4px solid ${c.color}`;
  document.getElementById('scoreStatus').textContent = `${score} / ${goal} pontos`;
  const pct = Math.min((score / goal) * 100, 100);
  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  bar.style.background = `linear-gradient(90deg, ${c.color}, ${c.color}cc)`;
  bar.textContent = `${score}/${goal}`;
}

function render() {
  renderMap();
  renderStatus();
  if (state.currentContinent >= 6) showVictory();
}

// ========== DICE ==========
function rollDice() {
  if (isRolling || answered) return;
  ensureAudio();
  isRolling = true;
  answered = false;
  const btn = document.getElementById('diceBtn');
  const display = document.getElementById('diceDisplay');
  btn.disabled = true;
  display.style.display = 'block';
  display.classList.add('dice-rolling');

  const diceFaces = ['\u2680','\u2681','\u2682','\u2683','\u2684','\u2685'];
  let rolls = 0;
  const maxRolls = 15;
  sfxDice();
  const interval = setInterval(() => {
    display.textContent = diceFaces[Math.floor(Math.random()*6)];
    rolls++;
    if (rolls >= maxRolls) {
      clearInterval(interval);
      currentDice = Math.floor(Math.random()*6)+1;
      display.textContent = diceFaces[currentDice-1];
      display.classList.remove('dice-rolling');
      isRolling = false;
      showQuestion();
    }
  }, 80);
}

// ========== QUESTIONS ==========
function getQuestion(level) {
  const pool = questions[level];
  const used = state.usedQs[level];
  let available = pool.map((q,i)=>i).filter(i=>!used.includes(i));
  if (available.length === 0) { state.usedQs[level] = []; available = pool.map((q,i)=>i); }
  const idx = available[Math.floor(Math.random()*available.length)];
  state.usedQs[level].push(idx);
  saveState();
  return pool[idx];
}

function showQuestion() {
  const level = CONTINENTS[state.currentContinent].level;
  currentQuestion = getQuestion(level);
  const area = document.getElementById('questionArea');
  const color = CONTINENTS[state.currentContinent].color;
  area.style.display = 'block';
  document.getElementById('questionText').style.borderLeftColor = color;
  document.getElementById('questionText').innerHTML = currentQuestion.q.replace(/\n/g,'<br>');
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const labels = ['A','B','C','D'];
  currentQuestion.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${labels[i]}) ${opt}`;
    btn.onclick = () => answerQuestion(i, btn);
    container.appendChild(btn);
  });
  document.getElementById('feedback').style.display = 'none';
}

function answerQuestion(choice, btnEl) {
  if (answered) return;
  answered = true;
  const correct = choice === currentQuestion.a;
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => { b.style.pointerEvents = 'none'; });
  allBtns[currentQuestion.a].classList.add('correct');
  if (!correct) btnEl.classList.add('wrong');

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  const ci = state.currentContinent;
  const goal = CONTINENTS[ci].goal;

  if (correct) {
    sfxCorrect();
    state.scores[ci] = Math.min(state.scores[ci] + currentDice, 999);
    fb.className = 'feedback correct-fb';
    fb.textContent = `Correto! +${currentDice} pontos`;
  } else {
    sfxWrong();
    state.scores[ci] = Math.max(state.scores[ci] - currentDice, 0);
    fb.className = 'feedback wrong-fb';
    fb.textContent = `Errado! -${currentDice} pontos`;
  }
  saveState();
  renderStatus();

  setTimeout(() => {
    if (state.scores[ci] >= goal) {
      conquerContinent(ci);
    } else {
      resetTurn();
    }
  }, 1500);
}

function resetTurn() {
  answered = false;
  document.getElementById('diceBtn').disabled = false;
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('diceDisplay').style.display = 'none';
}

// ========== CONQUEST ==========
function conquerContinent(ci) {
  state.conquered[ci] = true;
  state.currentContinent = ci + 1;
  saveState();
  render();
  spawnConfetti(80);
  sfxConquest();

  if (state.currentContinent >= 6) {
    setTimeout(showVictory, 1500);
    return;
  }
  const c = CONTINENTS[ci];
  document.getElementById('conquestTitle').textContent = `${c.emoji} ${c.name} Conquistada!`;
  document.getElementById('conquestTitle').style.color = c.color;
  document.getElementById('conquestText').textContent = `Voce conquistou ${c.name}! Proximo destino: ${CONTINENTS[ci+1].name}`;
  document.getElementById('conquestOverlay').classList.add('show');
}

function closeConquest() {
  document.getElementById('conquestOverlay').classList.remove('show');
  resetTurn();
  render();
}

function showVictory() {
  spawnConfetti(120);
  sfxVictory();
  document.getElementById('victoryOverlay').classList.add('show');
  document.getElementById('gameArea').style.display = 'none';
}

function resetGame() {
  if (!confirm('Tem certeza que deseja reiniciar o jogo? Todo o progresso sera perdido.')) return;
  state = defaultState();
  saveState();
  document.getElementById('victoryOverlay').classList.remove('show');
  document.getElementById('conquestOverlay').classList.remove('show');
  document.getElementById('gameArea').style.display = 'block';
  resetTurn();
  render();
}

// ========== INIT ==========
render();
if (state.currentContinent >= 6) {
  showVictory();
} else {
  resetTurn();
}
</script>
